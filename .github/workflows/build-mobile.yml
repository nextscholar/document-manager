name: Build Mobile App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 3.2.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build Android
        working-directory: mobile
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_SLUG: ${{ secrets.EXPO_SLUG }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_STACK_AUTH_URL: ${{ secrets.EXPO_PUBLIC_STACK_AUTH_URL }}
          EXPO_PUBLIC_STACK_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_STACK_PROJECT_ID }}
          EXPO_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.EXPO_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
        run: eas build --platform android --profile ${{ inputs.profile || 'preview' }} --non-interactive

      - name: Download Android artifact from EAS
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: mobile
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 10 --json 2>/dev/null | \
            jq -r --arg sha "${{ github.sha }}" '.[] | select(.gitCommitHash == $sha) | .artifacts.buildUrl' | head -1)
          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "Error: Could not find build artifact URL for commit ${{ github.sha }}"
            exit 1
          fi
          curl -L -o app-release.apk "$BUILD_URL"

      - name: Upload Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/app-release.apk
          tag_name: ${{ github.ref_name }}

  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: 3.2.1
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build iOS
        working-directory: mobile
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_SLUG: ${{ secrets.EXPO_SLUG }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_STACK_AUTH_URL: ${{ secrets.EXPO_PUBLIC_STACK_AUTH_URL }}
          EXPO_PUBLIC_STACK_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_STACK_PROJECT_ID }}
          EXPO_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.EXPO_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
        run: eas build --platform ios --profile ${{ inputs.profile || 'preview' }} --non-interactive

      - name: Download iOS artifact from EAS
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: mobile
        run: |
          BUILD_URL=$(eas build:list --platform ios --limit 10 --json 2>/dev/null | \
            jq -r --arg sha "${{ github.sha }}" '.[] | select(.gitCommitHash == $sha) | .artifacts.buildUrl' | head -1)
          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "Error: Could not find build artifact URL for commit ${{ github.sha }}"
            exit 1
          fi
          curl -L -o app-release.ipa "$BUILD_URL"

      - name: Upload iOS IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/app-release.ipa
          tag_name: ${{ github.ref_name }}

