services:
  db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-archive_brain}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-archive_brain}
    command: python -c "from src.db.init_db import init_db; init_db()"
    restart: "no"
    networks:
      - archive_net
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-archive_brain}
    volumes:
      - postgres_data1:/var/lib/postgresql/data
    networks:
      - archive_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-archive_brain}"]
      interval: 10s
      timeout: 5s
      retries: 10

  tika:
    image: apache/tika:latest
    restart: unless-stopped
    networks:
      - archive_net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - archive_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - archive_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling required models..."
        ollama pull nomic-embed-text
        ollama pull qwen2:1.5b
        echo "Models ready!"
    environment:
      OLLAMA_HOST: http://ollama:11434

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - worker_shared:/app/shared
      - ./archive_root:/data/archive
      - ./archive_root/inbox:/data/archive/inbox 
      - /root/test_paper:/data/archive/documents
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-archive_brain}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-archive_brain}
      TIKA_URL: http://tika:9998
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MOCK: ${OLLAMA_MOCK:-false}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:1.5b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      tika:
        condition: service_started
      ollama:
        condition: service_healthy
    command: python -m src.worker_loop
    networks:
      - archive_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - worker_shared:/app/shared
      - ./archive_root:/data/archive
      - ./archive_root/inbox:/data/archive/inbox 
      - /root/test_paper:/data/archive/documents
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-archive_brain}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-archive_brain}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MOCK: ${OLLAMA_MOCK:-false}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:1.5b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      TIKA_URL: http://tika:9998
      STACK_PROJECT_ID: ${STACK_PROJECT_ID:-}
      STACK_SECRET_SERVER_KEY: ${STACK_SECRET_SERVER_KEY:-}
      STACK_API_URL: ${STACK_API_URL:-https://api.stack-auth.com}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
      tika:
        condition: service_started
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    networks:
      - archive_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://api:8000
      VITE_STACK_API_URL: ${VITE_STACK_API_URL:-url}
      VITE_STACK_PROJECT_ID: ${VITE_STACK_PROJECT_ID:-id}
      VITE_STACK_PUBLISHABLE_CLIENT_KEY: ${VITE_STACK_PUBLISHABLE_CLIENT_KEY:-key}
    depends_on:
      - api
    networks:
      - archive_net
      - dokploy-network
volumes:
  postgres_data1:
  worker_shared:
  ollama_models:

networks:
  archive_net:
    driver: bridge
  dokploy-network:
    external: true
